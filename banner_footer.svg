<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="80" style="background:#0a0c16; font-family:'Segoe UI', Roboto, sans-serif;">
  <defs>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16" />
      <stop offset="100%" stop-color="#030408" />
    </linearGradient>
  </defs>

  <rect width="800" height="80" fill="url(#bg-grad)" />
  <rect width="800" height="4" fill="url(#purple-grad)" />

  <circle cx="50" cy="40" r="3" fill="#a78bfa">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="50" r="2" fill="#7c3aed">
    <animate attributeName="r" values="1;3;1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="40" r="3" fill="#8b5cf6">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="750" cy="30" r="2" fill="#4f46e5">
    <animate attributeName="r" values="1;3;1" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <text x="50%" y="45" font-size="11" font-weight="600" fill="#a78bfa" letter-spacing="4" text-anchor="middle">DESIGNED BY RISHI RAJ • © 2026 ALL RIGHTS RESERVED</text>
</svg>
