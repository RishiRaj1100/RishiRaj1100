<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background:#0a0c16; font-family:'Segoe UI', Roboto, sans-serif;">
  <defs>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16" />
      <stop offset="100%" stop-color="#030408" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg-grad)" />

  <g stroke="#311068" stroke-width="0.5" stroke-opacity="0.6">
    <line x1="80" y1="50" x2="140" y2="90">
      <animate attributeName="x1" values="80;85;75;80" dur="5s" repeatCount="indefinite" />
      <animate attributeName="y2" values="90;95;85;90" dur="5s" repeatCount="indefinite" />
    </line>
    <line x1="140" y1="90" x2="90" y2="150" />
    <line x1="90" y1="150" x2="40" y2="110" />
    <line x1="40" y1="110" x2="80" y2="50" />

    <line x1="720" y1="50" x2="760" y2="110" />
    <line x1="760" y1="110" x2="710" y2="150" />
    <line x1="710" y1="150" x2="660" y2="90" />
    <line x1="660" y1="90" x2="720" y2="50" />
  </g>

  <circle cx="80" cy="50" r="3" fill="#a78bfa">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" />
    <animate attributeName="cx" values="80;85;75;80" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="140" cy="90" r="4" fill="#8b5cf6">
    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="90;95;85;90" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="90" cy="150" r="3" fill="#7c3aed">
    <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="40" cy="110" r="4" fill="#4f46e5">
    <animate attributeName="r" values="3;5;3" dur="3.5s" repeatCount="indefinite" />
  </circle>

  <circle cx="720" cy="50" r="4" fill="#a78bfa">
    <animate attributeName="r" values="3;5;3" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="760" cy="110" r="3" fill="#8b5cf6">
    <animate attributeName="r" values="2;4;2" dur="3.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="710" cy="150" r="4" fill="#7c3aed">
    <animate attributeName="r" values="3;6;3" dur="2.7s" repeatCount="indefinite" />
  </circle>
  <circle cx="660" cy="90" r="3" fill="#4f46e5">
    <animate attributeName="r" values="2;4;2" dur="3.7s" repeatCount="indefinite" />
  </circle>

  <text x="50%" y="105" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="8" text-anchor="middle" filter="url(#glow)">RISHI RAJ</text>
  <text x="50%" y="145" font-size="12" font-weight="600" fill="#a78bfa" letter-spacing="3" text-anchor="middle">SCALABLE SYSTEMS • CLOUD-NATIVE ARCHITECTURE • AGENTIC AI</text>

  <rect y="196" width="800" height="4" fill="url(#purple-grad)" />
</svg>
