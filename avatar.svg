<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <defs>
    <radialGradient id="dot-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#4f46e5" />
    </radialGradient>
  </defs>

  <circle cx="75" cy="75" r="70" fill="none" stroke="#1e1b4b" stroke-width="1" stroke-dasharray="4,4" />
  <circle cx="75" cy="75" r="50" fill="none" stroke="#2e1065" stroke-width="0.5" stroke-dasharray="2,2" />

  <g stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.4">
    <line x1="75" y1="25" x2="118" y2="50">
      <animate attributeName="x1" values="75;78;72;75" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y1" values="25;28;22;25" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="118" y1="50" x2="118" y2="100">
      <animate attributeName="x2" values="118;120;116;118" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="118" y1="100" x2="75" y2="125">
      <animate attributeName="y2" values="125;122;128;125" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="75" y1="125" x2="32" y2="100">
      <animate attributeName="x1" values="75;72;78;75" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="32" y1="100" x2="32" y2="50">
      <animate attributeName="y1" values="100;98;102;100" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="32" y1="50" x2="75" y2="25">
      <animate attributeName="x2" values="75;78;72;75" dur="4s" repeatCount="indefinite" />
    </line>
  </g>

  <circle cx="75" cy="75" r="10" fill="url(#dot-grad)">
    <animate attributeName="r" values="8;13;8" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" />
  </circle>

  <circle cx="75" cy="25" r="4" fill="#a78bfa">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
    <animate attributeName="cy" values="25;28;22;25" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="118" cy="50" r="4" fill="#8b5cf6">
    <animate attributeName="r" values="5;3;5" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="cx" values="118;121;115;118" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="118" cy="100" r="4" fill="#7c3aed">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="100;103;97;100" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="75" cy="125" r="4" fill="#4f46e5">
    <animate attributeName="r" values="5;3;5" dur="2s" repeatCount="indefinite" />
    <animate attributeName="cy" values="125;122;128;125" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="32" cy="100" r="4" fill="#3b82f6">
    <animate attributeName="r" values="4;6;4" dur="3.5s" repeatCount="indefinite" />
    <animate attributeName="cx" values="32;29;35;32" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="32" cy="50" r="4" fill="#60a5fa">
    <animate attributeName="r" values="5;3;5" dur="2.2s" repeatCount="indefinite" />
    <animate attributeName="cy" values="50;47;53;50" dur="4s" repeatCount="indefinite" />
  </circle>

  <circle cx="55" cy="65" r="3" fill="#a78bfa">
    <animate attributeName="transform" type="translate" values="0,0; 2,-2; -1,1; 0,0" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="95" cy="65" r="3" fill="#8b5cf6">
    <animate attributeName="transform" type="translate" values="0,0; -2,2; 1,-1; 0,0" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="75" cy="100" r="3" fill="#7c3aed">
    <animate attributeName="transform" type="translate" values="0,0; 0,-3; 0,3; 0,0" dur="4s" repeatCount="indefinite" />
  </circle>
